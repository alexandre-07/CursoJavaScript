<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <style>
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        h1, p{
            font: bolder 2em Arial;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <h1 id="contador">0</h1>
    <p id="status"></p>

    <script>
        let contador = document.querySelector("#contador")
        let numero = 0
        let intervalo
        let status = document.querySelector("#status")
        
        function atualizarCor(){
            if(numero % 2 == 0){
                contador.style.color = "blue"
            } else{
                contador.style.color = "orange"
            }
        }

        contador.addEventListener("click", function(){
            if(numero < 20){
            numero++
        }
            contador.textContent = numero
            atualizarCor()
        })

        contador.addEventListener("dblclick", function(){
            numero = 0
            contador.textContent = numero
            atualizarCor()
        })

        contador.addEventListener("mousedown", function(){
            if(numero < 20){
                status.textContent = "CONTANDO"
            }
            if(!intervalo){
                intervalo = setInterval(function(){
                    if(numero < 20){
                        numero++
                        contador.textContent = numero
                        atualizarCor()
                    } else{
                        status.textContent = "LIMITE ATINGIDO"
                        clearInterval(intervalo)
                        intervalo = null
                    }       
                }, 100)
            }
        })

        contador.addEventListener("mouseup", function(){
            if(intervalo){
                clearInterval(intervalo)
                intervalo = null
            }
            if(numero < 20){
                status.textContent = "PARADO"
            }
            atualizarCor()
        })

    </script>
</body>
</html>
